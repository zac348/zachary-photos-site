<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — ZRP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--b1:#1e1e1e;--b2:#2a2a2a;--b3:#333;
  --t1:#efefef;--t2:#aaa;--t3:#666;--accent:#00b7e3;--accent-d:#0099c4;
  --accent-bg:rgba(0,183,227,.08);--accent-border:rgba(0,183,227,.25);
  --red:#ff4d4d;--green:#22c55e;--yellow:#f59e0b;--radius:8px;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.6}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* Sidebar */
.sidebar{background:var(--s1);border-right:1px solid var(--b1);padding:20px 0;display:flex;flex-direction:column}
.sidebar-logo{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:0 18px;margin-bottom:24px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:1px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12px;color:var(--t3);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.sb-link:hover,.sb-link.active{background:var(--s2);color:var(--t1)}
.sb-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0}

/* Main Content */
.main{padding:32px;overflow-y:auto}
.tab{display:none}.tab.active{display:block}
.main-title{font-size:18px;font-weight:400;letter-spacing:-.02em;margin-bottom:4px}
.main-sub{font-size:12px;color:var(--t3);margin-bottom:28px}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--b2)}

/* Cards & Lists */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.booking-list{display:flex;flex-direction:column;gap:8px}
.booking-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.booking-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.booking-detail{font-size:11px;color:var(--t2)}
.booking-detail strong{display:block;font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;color:var(--t3);margin-bottom:1px}

/* UI Elements */
.badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 8px;border-radius:3px;border:1px solid;text-transform:uppercase}
.badge.pending{color:var(--yellow);border-color:var(--yellow);background:rgba(245,158,11,.1)}
.badge.approved{color:var(--green);border-color:var(--green);background:rgba(34,197,94,.1)}
.acc-btn{background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:8px 16px;font-size:11px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-red{background:var(--red);color:white}
.btn-green{background:var(--green);color:white}
.no-data{font-size:12px;color:var(--t3);font-style:italic;padding:16px 0}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--b3);border-radius:6px;padding:10px 18px;font-size:12px;color:var(--t1);transform:translateY(60px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">ZRP Admin</div>
    <nav class="sidebar-nav">
      <button class="sb-link active" onclick="switchTab('bookings', this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Bookings</button>
      <button class="sb-link" onclick="switchTab('coupons', this)"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-717 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/></svg>Coupons</button>
    </nav>
  </aside>

  <main class="main">
    <div class="tab active" id="tab-bookings">
      <h1 class="main-title">Bookings</h1>
      <p class="main-sub">Manage requests and approve shoots.</p>
      <div class="sec-label">all bookings</div>
      <div class="booking-list" id="booking-list">Loading...</div>
    </div>

    <div class="tab" id="tab-coupons">
      <h1 class="main-title">Coupons</h1>
      <p class="main-sub">Create and manage discount codes.</p>
      <div id="coupons-list"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'bookings') loadBookings();
}

async function loadBookings() {
  const { data, error } = await _supabase
    .from('bookings')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) return console.error(error);

  const container = document.getElementById('booking-list');
  if (!data.length) {
    container.innerHTML = '<p class="no-data">No bookings found.</p>';
    return;
  }

  container.innerHTML = data.map(b => `
    <div class="card">
      <div class="booking-head">
        <div>
          <strong style="font-size:14px">${b.first_name} ${b.last_name}</strong>
          <span style="color:var(--t3); font-family:monospace; margin-left:8px">${b.booking_number || 'PENDING'}</span>
          <span class="badge ${b.status}">${b.status}</span>
        </div>
        <div style="font-size:12px; color:var(--accent)">${b.package_selected}</div>
      </div>
      <div class="booking-details">
        <div class="booking-detail"><strong>Date/Time</strong>${b.event_date} @ ${b.event_time}</div>
        <div class="booking-detail"><strong>Location</strong>${b.event_location}</div>
        <div class="booking-detail"><strong>Total</strong>${b.total}</div>
        <div class="booking-detail"><strong>Deposit</strong>${b.deposit}</div>
      </div>
      <div style="margin-top:12px; display:flex; gap:8px">
        ${b.status === 'pending' ? `
          <button class="acc-btn btn-green" onclick="approveBooking('${b.id}')">Approve</button>
          <button class="acc-btn btn-red" onclick="declineBooking('${b.id}')">Decline</button>
        ` : ''}
        ${b.status === 'approved' ? `
          <button class="acc-btn" onclick="toast('Invoice logic here')">View Invoice</button>
        ` : ''}
      </div>
    </div>
  `).join('');
}

async function approveBooking(id) {
  const { data: booking } = await _supabase.from('bookings').select('*').eq('id', id).single();
  
  // Logic to flip status to approved
  const { error } = await _supabase
    .from('bookings')
    .update({ status: 'approved' })
    .eq('id', id);

  if (error) {
    toast("Error: " + error.message);
  } else {
    toast("Booking Approved!");
    loadBookings();
  }
}

async function declineBooking(id) {
  if (!confirm("Are you sure you want to decline and delete this booking?")) return;

  const { error } = await _supabase
    .from('bookings')
    .delete()
    .eq('id', id);

  if (error) {
    toast("Delete failed: " + error.message);
    console.error(error);
  } else {
    toast("Booking deleted.");
    loadBookings();
  }
}

// Initial Load
loadBookings();
</script>
</body>
</html>
