<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — ZRP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --bg:#0a0a0a;--s1:#111;--s2:#181818;--b1:#1e1e1e;--b2:#2a2a2a;--b3:#333;
    --t1:#efefef;--t2:#aaa;--t3:#666;--accent:#00b7e3;--accent-d:#0099c4;
    --accent-bg:rgba(0,183,227,.08);--accent-border:rgba(0,183,227,.25);
    --red:#ff4d4d;--green:#22c55e;--yellow:#f59e0b;--radius:8px;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.6}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* SIDEBAR */
.sidebar{background:var(--s1);border-right:1px solid var(--b1);padding:20px 0;display:flex;flex-direction:column}
.sidebar-logo{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:0 18px;margin-bottom:24px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:1px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12px;color:var(--t3);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.sb-link:hover,.sb-link.active{background:var(--s2);color:var(--t1)}
.sb-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0}
.logout-btn{font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;padding:20px;text-align:left}

/* MAIN */
.main{padding:32px;overflow-y:auto}
.tab{display:none}.tab.active{display:block}
.main-title{font-size:18px;font-weight:400;margin-bottom:4px}
.main-sub{font-size:12px;color:var(--t3);margin-bottom:28px}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--b2)}

/* DASHBOARD STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--b1);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:28px}
.stat{background:var(--s1);padding:16px}
.stat-n{font-size:22px;font-weight:300;color:var(--accent)}
.stat-l{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;color:var(--t3)}

/* FORMS & UI */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase}
input, select, textarea{background:var(--s1);border:1px solid var(--b1);color:var(--t1);padding:9px;border-radius:6px;outline:none}
.acc-btn{background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:9px 16px;cursor:pointer;font-weight:500}
.acc-btn.red{background:var(--red);color:white}
.acc-btn.green{background:var(--green);color:white}

/* BOOKING CARDS */
.booking-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.booking-head{display:flex;justify-content:space-between;margin-bottom:12px}
.status-badge{font-size:8px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;text-transform:uppercase;border:1px solid}
.status-badge.pending{color:var(--yellow);border-color:var(--yellow)}
.status-badge.approved{color:var(--green);border-color:var(--green)}

/* PHOTOS GRID */
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.photo-card{background:var(--s1);border:1px solid var(--b1);border-radius:6px;overflow:hidden;position:relative}
.photo-card img{width:100%;aspect-ratio:1;object-fit:cover}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--b3);padding:12px 20px;border-radius:6px;opacity:0;transition:0.3s;z-index:1000}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">ZRP Admin</div>
        <nav class="sidebar-nav">
            <button class="sb-link active" onclick="switchTab('overview', this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Overview</button>
            <button class="sb-link" onclick="switchTab('upload', this)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload</button>
            <button class="sb-link" onclick="switchTab('galleries', this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galleries</button>
            <button class="sb-link" onclick="switchTab('bookings', this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Bookings</button>
            <button class="sb-link" onclick="switchTab('coupons', this)"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>Coupons</button>
        </nav>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </aside>

    <main class="main">
        <div class="tab active" id="tab-overview">
            <h1 class="main-title">Dashboard</h1>
            <div class="stats-row">
                <div class="stat"><div class="stat-n" id="st-photos">0</div><div class="stat-l">Photos</div></div>
                <div class="stat"><div class="stat-n" id="st-bookings">0</div><div class="stat-l">Bookings</div></div>
            </div>
            <div class="sec-label">recent activity</div>
            <div id="recent-bookings"></div>
        </div>

        <div class="tab" id="tab-upload">
            <h1 class="main-title">Upload Photos</h1>
            <div class="field"><label>Event</label><select id="up-sport"><option>Football</option><option>Basketball</option><option>Other</option></select></div>
            <input type="file" id="file-input" multiple accept="image/*" onchange="handleUpload(this.files)">
            <div id="upload-status"></div>
            <div class="sec-label">Portfolio</div>
            <div class="photos-grid" id="photos-grid"></div>
        </div>

        <div class="tab" id="tab-galleries">
            <h1 class="main-title">Client Galleries</h1>
            <div class="field"><label>New Gallery Name</label><input type="text" id="new-gal-name"><button class="acc-btn" onclick="createGallery()">Create</button></div>
            <div id="gal-list"></div>
        </div>

        <div class="tab" id="tab-bookings">
            <h1 class="main-title">Bookings</h1>
            <div id="all-bookings"></div>
        </div>

        <div class="tab" id="tab-coupons">
            <h1 class="main-title">Coupons</h1>
            <div class="field"><label>Code</label><input type="text" id="cp-code"></div>
            <div class="field"><label>Type</label><select id="cp-type"><option value="percent">Percentage</option><option value="fixed">Fixed $</option><option value="travel">Waive Travel</option></select></div>
            <div class="field"><label>Value</label><input type="number" id="cp-value"></div>
            <button class="acc-btn" onclick="createCoupon()">Create Coupon</button>
            <div class="sec-label">Active Coupons</div>
            <div id="coupons-list"></div>
        </div>
    </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    loadData(name);
}

async function loadData(tab) {
    if (tab === 'bookings' || tab === 'overview') loadBookings();
    if (tab === 'upload') loadPhotos();
    if (tab === 'galleries') loadGalleries();
    if (tab === 'coupons') loadCoupons();
}

// --- BOOKINGS LOGIC ---
async function loadBookings() {
    const { data } = await _supabase.from('bookings').select('*').order('created_at', {ascending: false});
    const html = data.map(b => `
        <div class="booking-card">
            <div class="booking-head">
                <strong>${b.first_name} ${b.last_name} (${b.booking_number || 'No Num'})</strong>
                <span class="status-badge ${b.status}">${b.status}</span>
            </div>
            <div style="font-size:11px; color:var(--t2)">${b.event_date} | ${b.package_selected} | ${b.total}</div>
            <div style="margin-top:10px">
                ${b.status === 'pending' ? `
                    <button class="acc-btn green" onclick="approveBooking('${b.id}')">Approve</button>
                    <button class="acc-btn red" onclick="declineBooking('${b.id}')">Decline</button>
                ` : `<button class="acc-btn" onclick="toast('Invoice Logic Attached')">Invoice PDF</button>`}
            </div>
        </div>
    `).join('');
    document.getElementById('all-bookings').innerHTML = html;
    if(document.getElementById('recent-bookings')) document.getElementById('recent-bookings').innerHTML = html;
    document.getElementById('st-bookings').textContent = data.length;
}

async function approveBooking(id) {
    const { error } = await _supabase.from('bookings').update({ status: 'approved' }).eq('id', id);
    if (!error) { toast("Approved!"); loadBookings(); }
}

async function declineBooking(id) {
    if(!confirm("Delete this booking?")) return;
    const { error } = await _supabase.from('bookings').delete().eq('id', id);
    if (!error) { toast("Deleted."); loadBookings(); }
}

// --- PHOTOS LOGIC ---
async function loadPhotos() {
    const { data } = await _supabase.from('portfolio_photos').select('*').order('created_at', {ascending: false});
    document.getElementById('photos-grid').innerHTML = data.map(p => `<div class="photo-card"><img src="${p.url}"><button onclick="delPhoto('${p.id}')">Delete</button></div>`).join('');
    document.getElementById('st-photos').textContent = data.length;
}

async function handleUpload(files) {
    for (let file of files) {
        const path = `public/${Date.now()}_${file.name}`;
        await _supabase.storage.from('photos').upload(path, file);
        const { data: { publicUrl } } = _supabase.storage.from('photos').getPublicUrl(path);
        await _supabase.from('portfolio_photos').insert({ url: publicUrl, storage_path: path });
    }
    toast("Upload Complete"); loadPhotos();
}

// --- COUPONS LOGIC ---
async function createCoupon() {
    const code = document.getElementById('cp-code').value.toUpperCase();
    const type = document.getElementById('cp-type').value;
    const val = document.getElementById('cp-value').value;
    await _supabase.from('coupons').insert({ code, type, value: val });
    toast("Coupon Created"); loadCoupons();
}

async function loadCoupons() {
    const { data } = await _supabase.from('coupons').select('*');
    document.getElementById('coupons-list').innerHTML = data.map(c => `<div>${c.code} - ${c.type} (${c.value}) <button onclick="delCoupon('${c.id}')">X</button></div>`).join('');
}

// Initial Load
loadBookings();
</script>
</body>
</html>
