<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — ZRP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border2: #333; --text: #e8e8e8; --muted: #666; --muted2: #888; --accent: #c8ff00; --accent-d: #a8d900; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { width: 100%; max-width: 360px; padding: 0 24px; }
  .login-logo { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 40px; text-align: center; letter-spacing: 0.04em; }
  .login-title { font-size: 20px; font-weight: 400; margin-bottom: 6px; text-align: center; letter-spacing: -0.02em; }
  .login-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 32px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 11px 14px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus { border-color: var(--border2); }
  .login-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .login-btn:hover { background: var(--accent-d); }
  .error-msg { font-size: 12px; color: #ff6b6b; text-align: center; margin-top: 12px; display: none; }
  .back-link { display: block; text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="login-box">
  <p class="login-logo">Zachary Routsong Photography</p>
  <h1 class="login-title">Admin login</h1>
  <p class="login-sub">Only Zachary should be here.</p>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="zachary@email.com"/>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>
  <button class="login-btn" onclick="login()">Sign in</button>
  <p class="error-msg" id="error-msg">Incorrect email or password.</p>
  <a href="index.html" class="back-link">← Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already logged in, go straight to dashboard
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'admin.html';
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.style.display = 'block';
    } else {
      window.location.href = 'admin.html';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
