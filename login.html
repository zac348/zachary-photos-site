<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — ZRP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--s1:#111;--s2:#181818;--b1:#1e1e1e;--b2:#2a2a2a;--t1:#efefef;--t2:#aaa;--t3:#666;--accent:#00b7e3;--accent-d:#0099c4;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:14px}
.box{width:100%;max-width:340px;padding:0 24px}
.logo{font-size:12px;font-weight:500;color:var(--t3);text-align:center;margin-bottom:36px;letter-spacing:.04em}
.title{font-size:18px;font-weight:400;text-align:center;margin-bottom:4px;letter-spacing:-.02em}
.sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:28px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
input{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;outline:none;transition:border-color .15s;width:100%;color-scheme:dark}
input:focus{border-color:var(--b2);background:var(--s2)}
.btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:var(--accent-d)}
.err{font-size:11px;color:#ff4d4d;text-align:center;margin-top:10px;display:none}
.back{display:block;text-align:center;margin-top:20px;font-size:11px;color:var(--t3);text-decoration:none;transition:color .15s}
.back:hover{color:var(--t1)}
</style>
</head>
<body>
<div class="box">
  <p class="logo">Zachary Routsong Photography</p>
  <h1 class="title">Admin login</h1>
  <p class="sub">Only Zachary should be here.</p>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="zachary@email.com"/></div>
  <div class="field"><label>Password</label><input type="password" id="pw" placeholder="••••••••"/></div>
  <button class="btn" onclick="login()">Sign in</button>
  <p class="err" id="err">Incorrect email or password.</p>
  <a href="index.html" class="back">← Back to site</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
sb.auth.getSession().then(({data})=>{if(data.session)window.location.href='admin.html';});
async function login(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){document.getElementById('err').style.display='block';}
  else{window.location.href='admin.html';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
